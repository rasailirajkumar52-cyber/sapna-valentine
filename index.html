<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ultra Cheesy Valentine 💖</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: radial-gradient(circle, #ff758c, #ff7eb3);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .card {
      background: rgba(0, 0, 0, 0.3);
      padding: 35px;
      border-radius: 25px;
      width: 350px;
      box-shadow: 0 0 30px rgba(255, 0, 100, 0.6);
    }

    h1 {
      font-size: 24px;
    }

    button {
      margin: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .yes {
      background: #ff2e63;
      color: white;
    }

    .no {
      background: #444;
      color: white;
      position: absolute;
    }

    .yes:hover {
      transform: scale(1.1);
      background: #ff0844;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1 id="line">Hey you 😳💘</h1>
    <p id="message">I have some VERY serious questions…</p>
    <button onclick="nextLine()">Continue 😏</button>
  </div>

  <button class="no" id="noBtn" onclick="moveNo()">No 🙄</button>

  <script>
    const lines = [
      "Do you believe in love at first click? 🖱️❤️",
      "Because my heart just buffered… and chose YOU 💓⌛",
      "Are you a keyboard? 🤔",
      "Because you’re just my type 😌⌨️",
      "Do you like cheesy lines? 🧀",
      "Because I have about a thousand more… 😏",
      "Okay okay… final question… 💥💖"
    ];

    let i = 0;

    function nextLine() {
      if (i < lines.length) {
        document.getElementById("line").innerText = lines[i];
        document.getElementById("message").innerText = "";
        i++;
      } else {
        document.getElementById("line").innerText = "💘 WILL YOU BE MY VALENTINE? 💘";
        document.getElementById("message").innerText =
          "Say yes and I promise bad jokes, good vibes, and unlimited appreciation 🥰";
        document.querySelector(".card button").remove();
      }
    }

    function moveNo() {
      const btn = document.getElementById("noBtn");
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);
      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }
  </script>

</body>
</html>
